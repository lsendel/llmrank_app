name = "llm-boost-api"
main = "src/index.ts"
compatibility_date = "2025-12-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

routes = [
  { pattern = "api.llmrank.app/*", zone_name = "llmrank.app" }
]

[[services]]
binding = "WEB_WORKER"
service = "llm-boost-web"

[[r2_buckets]]
binding = "R2"
bucket_name = "ai-seo-storage"

[[kv_namespaces]]
binding = "KV"
id = "a1b4b94676c04ac997f69d2a5ca03dad"

[[kv_namespaces]]
binding = "SEEN_URLS"
id = "890e3a5ce54f4c3883556dce292ceb20"

[browser]
binding = "BROWSER"

# Workers AI — in-worker LLM content scoring (gpt-oss-120b by default).
[ai]
binding = "AI"

[[d1_databases]]
binding = "D1_APP"
database_name = "llmrank-app"
database_id = "d2643e8f-bb26-4d10-a328-5fa37f5f090e"
migrations_dir = "../../packages/db/migrations/d1"

[[d1_databases]]
binding = "D1_ADMIN"
database_name = "llmrank-admin"
database_id = "59db09ba-f7c4-418b-a7e3-2aee0a9339a6"
migrations_dir = "../../packages/db/migrations/d1"

[[hyperdrive]]
binding = "SUPABASE"
id = "37e8d64095474994b45ea3b3ccfe3b66"

[vars]
CRAWLER_URL = "https://llmrank-crawler.fly.dev"
REPORT_SERVICE_URL = "https://llm-boost-reports.fly.dev"
APP_BASE_URL = "https://llmrank.app"
BETTER_AUTH_URL = "https://api.llmrank.app"
# Extra cross-origin callers (dogfood/partner sites). Exact origins and/or host
# suffixes, comma-separated. ".care" preserves the prior dogfood behavior as
# config (was a hardcoded `origin.endsWith(".care")`); tighten to exact origins
# (e.g. "https://families.care,https://www.families.care") when enumerable.
CORS_ALLOWED_ORIGINS = ".care"
# Allowed callback-host suffixes for the first-party /connect token exchange.
CONNECT_ALLOWED_CALLBACK_HOSTS = "indices.app,families.care,localhost"

[env.preview]
[env.preview.vars]
APP_BASE_URL = "https://staging.llmrank.app"
BETTER_AUTH_URL = "https://api-staging.llmrank.app"

[env.production]
[env.production.vars]
APP_BASE_URL = "https://llmrank.app"
BETTER_AUTH_URL = "https://api.llmrank.app"

[triggers]
crons = ["0 0 1 * *", "*/5 * * * *", "*/15 * * * *", "0 3 * * *", "0 4 * * *", "0 9 * * 1", "0 9 1 * *", "0 2 * * 7", "0 2 * * *"] # Reset monthly + Scheduled crawls every 5 min + Visibility checks every 15 min + Daily cleanup 3AM + Benchmark aggregation 4AM + Weekly digest Mon 9AM + Monthly digest 1st 9AM + Competitor monitoring Sun 2AM + Analytics rollup 2AM daily

# Secrets (set via `wrangler secret put`):
# SUPABASE_DATABASE_URL, SHARED_SECRET, ANTHROPIC_API_KEY, STRIPE_SECRET_KEY, STRIPE_WEBHOOK_SECRET,
# CLERK_PUBLISHABLE_KEY, CLERK_SECRET_KEY, RESEND_API_KEY,
# META_APP_ID, META_APP_SECRET
