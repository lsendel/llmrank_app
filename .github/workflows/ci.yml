name: CI

on:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm typecheck

      - name: Run tests
        run: pnpm test

      - name: Verify settings disclosure guardrails
        run: |
          pnpm --filter @llm-boost/web test -- \
            'src/components/forms/crawl-settings-form.component.test.tsx' \
            'src/components/forms/crawl-settings-form.test.ts' \
            'src/components/settings/scoring-profile-section.test.tsx' \
            'src/components/settings/site-context-section.test.tsx'

      - name: Verify journey spec discovery
        run: pnpm --filter @llm-boost/web exec playwright test e2e/journeys.spec.ts --list

      - name: Check coverage thresholds
        run: |
          pnpm --filter @llm-boost/api test -- --coverage
          pnpm --filter @llm-boost/db test -- --coverage
          pnpm --filter @llm-boost/scoring test -- --coverage
          pnpm --filter @llm-boost/llm test -- --coverage
          pnpm --filter @llm-boost/shared test -- --coverage
          pnpm --filter @llm-boost/integrations test -- --coverage
          pnpm --filter @llm-boost/billing test -- --coverage

  bundle-size:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build web app
        run: pnpm --filter @llm-boost/web build
        env:
          # Disable telemetry during build
          NEXT_TELEMETRY_DISABLED: 1

      - name: Analyze bundle size
        uses: andresz1/size-limit-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          directory: apps/web
          build_script: build
          skip_step: build

  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/crawler

      - name: Check crawler
        run: cargo check
        working-directory: apps/crawler

      - name: Test crawler
        run: cargo test
        working-directory: apps/crawler
