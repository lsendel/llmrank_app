name: Deploy Fly.io

on:
  push:
    branches: [main]
    paths:
      - "apps/crawler/**"
      - "apps/report-service/**"
      - "packages/pipeline/**"
      - "packages/parsers/**"
      - "packages/repositories/**"
      - "packages/scoring/**"
      - "infra/docker/Dockerfile.crawler"

jobs:
  deploy-crawler:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - run: flyctl deploy -a llmrank-crawler
        working-directory: apps/crawler
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  deploy-report-service:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - run: flyctl deploy -a llm-boost-reports --dockerfile apps/report-service/Dockerfile --config apps/report-service/fly.toml
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
